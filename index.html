<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0805" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gruvio" />
  
  </head>
  <style>
    html,body,#root{overflow-x:hidden;width:100%;max-width:100%;}
    *{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
    input,textarea{-webkit-user-select:text;-moz-user-select:text;user-select:text;}
    @media(min-width:600px){
      body{background:#060402!important;}
      .phone-frame{width:100%;max-width:480px;margin:0 auto;min-height:100vh;box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 32px 80px rgba(0,0,0,0.9),0 0 60px rgba(255,87,51,0.06);position:relative;}
      .frame-overlay{left:50%!important;right:auto!important;transform:translateX(-50%)!important;width:480px!important;max-width:480px!important;}
    }
  </style>
  <body>
    <div id="root"></div>
    <script src="https://maps.googleapis.com/maps/api/js?key=%VITE_GOOGLE_MAPS_KEY%&libraries=places&loading=async" async></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
