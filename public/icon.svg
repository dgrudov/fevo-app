<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d05"/>
      <stop offset="100%" style="stop-color:#0a0805"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5733"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#ff5733;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff5733;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Soft glow blob -->
  <ellipse cx="256" cy="230" rx="180" ry="160" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.15"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.08"/>

  <!-- G letter — bold, centered -->
  <text
    x="256" y="318"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="220"
    font-weight="900"
    fill="url(#accent)"
    text-anchor="middle"
    letter-spacing="-8"
  >G</text>

  <!-- Subtle bottom line accent -->
  <line x1="156" y1="370" x2="356" y2="370" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
</svg>
