<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d05"/>
      <stop offset="100%" style="stop-color:#0a0805"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5733"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff5733;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff5733;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <!-- Globe circle -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#accent)" stroke-width="14" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="256" rx="60" ry="148" fill="none" stroke="url(#accent)" stroke-width="9" opacity="0.5"/>
  <line x1="108" y1="256" x2="404" y2="256" stroke="url(#accent)" stroke-width="9" opacity="0.5"/>
  <line x1="120" y1="196" x2="392" y2="196" stroke="url(#accent)" stroke-width="7" opacity="0.35"/>
  <line x1="120" y1="316" x2="392" y2="316" stroke="url(#accent)" stroke-width="7" opacity="0.35"/>
  <!-- F letter overlay -->
  <text x="256" y="298" font-family="Arial Black, sans-serif" font-size="148" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.08">F</text>
</svg>
